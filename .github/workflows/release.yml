name: Release ZIP

on:
  push:
    tags:
      - "v*"

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create ZIP
        run: |
          zip -r cbpi4-DependentDelayActor-${{ github.ref_name }}.zip . \
            -x ".git/*" ".github/*" "__pycache__/*" "*.pyc" "*.egg-info/*" "build/*" "dist/*"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: cbpi4-DependentDelayActor-${{ github.ref_name }}.zip
